server:
  port: 8082

spring:
  application:
    name: event-processor
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: event-processor
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.key.delegate.class: org.apache.kafka.common.serialization.StringDeserializer
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
        # Only the processor's own Event record needs to be deserializable; the
        # ingest module's record is structurally identical but lives in a
        # different package and is never requested at runtime. Keep the trusted
        # set as small as possible to shrink Jackson's polymorphic-typing surface.
        spring.json.trusted.packages: com.dskow.eventplatform.processor.model
        spring.json.value.default.type: com.dskow.eventplatform.processor.model.Event
        spring.json.use.type.headers: false
    producer:
      # Required so the DLT recoverer can publish poison-pill records.
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        enable.idempotence: true
    template:
      observation-enabled: true
    listener:
      # Reads trace context from incoming record headers so the consumer's spans
      # link back to the producer's request. Combined with template.observation
      # on the ingest side and 100% sampling, every request has an end-to-end
      # traceId that appears in all four services' logs.
      observation-enabled: true

app:
  events-topic: events
  dlt-topic: events.DLT
  archive-bucket: ${ARCHIVE_BUCKET:event-archive}
  archive-max-attempts: 3
  archive-initial-backoff-ms: 100
  archive-max-backoff-ms: 2000
  s3:
    endpoint: ${S3_ENDPOINT:#{null}}
    region: ${AWS_REGION:us-east-1}

logging:
  # See event-ingest for rationale. Set LOG_FORMAT=ecs to emit ECS JSON.
  structured:
    format:
      console: ${LOG_FORMAT:}

management:
  # Actuator on a separate, internal-only port; see event-gateway for rationale.
  server:
    port: 9082
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      # See event-gateway for rationale: management port is internal-only and
      # has no auth, so when-authorized resolves to "never" — make it explicit.
      show-details: never
  tracing:
    sampling:
      probability: 1.0
