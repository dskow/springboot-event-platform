server:
  port: 8080

spring:
  application:
    name: event-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ingest-route
              uri: ${INGEST_URL:http://localhost:8081}
              predicates:
                - Path=/api/events/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ingestCB
                    fallbackUri: forward:/fallback/events
                # Only safe (idempotent) methods are retried automatically. Retrying
                # POSTs from an intermediary risks duplicate processing — the upstream
                # may have already accepted the request before the failure surface
                # appeared. Clients that want safe POST retry should send an
                # Idempotency-Key header; the ingest service uses it as the event id
                # so downstream consumers can dedupe by it.
                - name: Retry
                  args:
                    retries: 3
                    methods: GET
                    statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT
                    backoff:
                      firstBackoff: 100ms
                      maxBackoff: 1s
                      factor: 2
                      basedOnPreviousValue: false

app:
  security:
    # Comma-separated list of accepted X-API-Key values.
    api-keys: ${API_KEYS:}
    # Default is fail-closed: an empty api-keys is a startup error. Set this to
    # true to deliberately accept anonymous traffic (e.g. when running behind a
    # mTLS-terminating mesh that authenticates upstream).
    allow-open-mode: ${ALLOW_OPEN_MODE:false}
    # Number of trusted reverse proxies in front of the gateway. The remote IP
    # used for rate-limit keys and audit logs is taken from X-Forwarded-For
    # minus this many right-most entries. 0 = trust nothing, use TCP peer.
    trusted-proxy-hops: ${TRUSTED_PROXY_HOPS:0}
    # Token-bucket parameters per API key (or per remote IP if no key supplied).
    rate-limit-rps: ${RATE_LIMIT_RPS:10}
    rate-limit-burst: ${RATE_LIMIT_BURST:20}

resilience4j:
  circuitbreaker:
    instances:
      ingestCB:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
  timelimiter:
    instances:
      ingestCB:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway,circuitbreakers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      # Demo: trace 100% of requests so every line is correlatable. In production
      # you'd back this off to 0.1 or so to control storage costs.
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
    io.github.resilience4j: INFO
