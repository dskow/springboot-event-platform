name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish-and-sign:
    name: Build, push, and sign images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        service: [event-gateway, event-ingest, event-processor]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tag="${GITHUB_REF_NAME#v}"
          repo_lower="${GITHUB_REPOSITORY,,}"
          image="ghcr.io/${repo_lower}/${{ matrix.service }}"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tags=${image}:${tag},${image}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        run: |
          cosign sign --yes "${{ steps.tags.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: Attest image build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
