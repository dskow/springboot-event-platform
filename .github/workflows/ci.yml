name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test
        run: mvn -B verify

      - name: Build Docker images
        run: |
          docker build -f event-gateway/Dockerfile -t event-gateway:ci .
          docker build -f event-ingest/Dockerfile   -t event-ingest:ci   .
          docker build -f event-processor/Dockerfile -t event-processor:ci .

  pentest:
    name: ZAP baseline pen-test
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Bring up the full stack
        run: docker compose up -d --build

      - name: Wait for gateway to accept connections
        # /actuator/health lives on the internal management port (9080), which is
        # not published. Probe the user-facing route instead — any HTTP status
        # means the server is up; 401 means auth is wired and the gateway is
        # responding. 000/connection refused means it's still booting.
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/api/events 2>/dev/null || echo "000")
            case "$code" in
              000) ;;
              *) echo "gateway responding (HTTP $code) after $((i*5))s"; exit 0 ;;
            esac
            sleep 5
          done
          echo "gateway never came up — dumping compose logs"
          docker compose logs --no-color | tail -300
          exit 1

      - name: ZAP baseline scan
        # Passive scan only (no attack payloads). Safe to run on every PR.
        # Reports surface as a job artifact and a workflow summary; the build
        # is not failed on findings since this is a portfolio app — surface
        # the report, address findings deliberately rather than reactively.
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-report

      - name: Tear down
        if: always()
        run: docker compose down -v
