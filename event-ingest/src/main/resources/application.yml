server:
  port: 8081
  # Body-size cap is enforced upstream by the gateway's RequestSize filter
  # (event-gateway/application.yml). Tomcat's max-http-form-post-size only
  # bounds application/x-www-form-urlencoded parameter parsing — it would
  # be a no-op against the application/json bodies this endpoint actually
  # accepts, so we don't pretend to cap here.
  max-http-request-header-size: 8KB

spring:
  application:
    name: event-ingest
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    template:
      # Propagate the current trace as Kafka record headers so the processor
      # picks the same traceId up on the consumer side.
      observation-enabled: true

app:
  events-topic: events

management:
  # Actuator on a separate, internal-only port; see event-gateway for rationale.
  server:
    port: 9081
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
