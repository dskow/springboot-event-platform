server:
  port: 8081
  # Cap the request body size before validation runs. The legitimate event
  # payload is well under 1 KB; 64 KB leaves room for unusually verbose
  # serializers without inviting memory-pressure attacks.
  tomcat:
    max-http-form-post-size: 64KB
  max-http-request-header-size: 8KB

spring:
  application:
    name: event-ingest
  threads:
    virtual:
      enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    template:
      # Propagate the current trace as Kafka record headers so the processor
      # picks the same traceId up on the consumer side.
      observation-enabled: true

app:
  events-topic: events

management:
  # Actuator on a separate, internal-only port; see event-gateway for rationale.
  server:
    port: 9081
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
